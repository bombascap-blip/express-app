name: Deploy to Render 
on: 
  push: 
    branches: [ main ] 
jobs: 
  deploy: 
    runs-on: ubuntu-latest 
    steps: 
      - uses: actions/checkout@v4 
      - name: Deploy to Render 
        uses: ttskch/render-deploy@v1.0.0 
        with: 
          api-key: \${{ secrets.RENDER_API_KEY }} 
          service-id: \${{ secrets.RENDER_SERVICE_ID }} 
